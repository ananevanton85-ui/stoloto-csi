<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#111827"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"><title>Stoloto CSI</title></head><body><main><h1>Stoloto CSI Analyzer</h1><p class="muted">PWA-прототип: загрузите CSV архива, выберите формат, получите частоты и варианты.</p><section class="card"><label>Игра / формат</label><select id="game"><option value="ohota">Охота: 2 поля по 4 из 20</option><option value="zabava">Забава: 12 из 24</option><option value="custom">Пользовательский формат</option></select><div id="custom" class="hidden grid"><input id="fields" type="number" value="1" min="1" placeholder="полей"><input id="pick" type="number" value="4" min="1" placeholder="чисел в поле"><input id="maxnum" type="number" value="20" min="2" placeholder="макс число"></div><input id="file" type="file" accept=".csv,.txt"><button id="demo">Демо: Охота</button><button id="analyze">Анализировать</button></section><section id="out" class="card hidden"></section></main><script src="app.js"></script><script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script></body></html>
